  <title>مدينة الفكر | مدونة فقهية عصرية</title>

        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="تبديل الوضع الفاتح والداكن" title="تبديل الإضاءة">

              <path d="M21 14.5A8.5 8.5 0 1 1 9.5 3a7 7 0 0 0 11.5 11.5z"/>
